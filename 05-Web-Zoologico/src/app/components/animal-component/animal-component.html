<div class="">
  <button
    type="button"
    class="btn btn-primary"
    data-bs-toggle="modal"
    data-bs-target="#exampleModal"
  >
    Registrar animal
  </button>
</div>

<div class="table-responsive">
  <table class="table table-striped table-sm">
    <thead>
      <tr>
        <th scope="col">Nombre</th>
        <th scope="col">Edad</th>
        <th scope="col">Tipo</th>
      </tr>
    </thead>
    <tbody>
      @for (animal of animalList; track animal._id) {
        <tr>
          <td>{{ animal.nombre }}</td>
          <td>{{ animal.edad }}</td>
          <td>{{ animal.tipo }}</td>
          <td>
            <button type="button" class="btn btn-primary" (click)="toggleEditAnimal(animal._id)">
              <i class="bi bi-pencil-square"></i>
            </button>
          </td>
          <td>
            <button type="button" class="btn btn-primary" (click)="deleteAnimalEntry(animal._id)">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>

<div
  class="modal fade"
  id="exampleModal"
  tabindex="-1"
  aria-labelledby="exampleModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Nuevo animal</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form class="card p-2" (ngSubmit)="newAnimalEntry()" [formGroup]="animalForm">
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre</label>
            <input
              type="text"
              class="form-control"
              id="nombre"
              aria-describedby="emailHelp"
              placeholder="Nombre del animal"
              formControlName="nombre"
            />
          </div>
          <div class="mb-3">
            <label for="edad" class="form-label">Edad</label>
            <input
              type="number"
              class="form-control"
              id="edad"
              placeholder="Edad animal"
              formControlName="edad"
            />
          </div>
          <div class="mb-3">
            <label for="tipo" class="form-label">Tipo</label>
            <input
              type="text"
              class="form-control"
              id="tipo"
              placeholder="Tipo de animal"
              formControlName="tipo"
            />
          </div>
          <div class="input-group justify-content-center md-12">
            <button type="submit" class="btn btn-primary" data-bs-dismiss="modal">Guardar</button>​
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>​
      </div>
    </div>
  </div>
</div> <!-- 13rian: AQUÍ DEBÍA IR EL CIERRE DEL MODAL -->

<!-- 13rian: El formulario de edición se saca del modal para que sea visible en la página -->
<div *ngIf="editableAnimal" class="mt-4">
  <h3>Editar Animal</h3>
  <form
    class="card p-2"
    (ngSubmit)="updateAnimalEntry()"
    [formGroup]="animalForm"
  >
    <div class="mb-3">
      <label for="nombre" class="form-label">Nombre</label>
      <input
        type="text"
        class="form-control"
        id="nombre"
        aria-describedby="emailHelp"
        placeholder="Nombre del animal"
        formControlName="nombre"
      />
    </div>
    <div class="mb-3">
      <label for="edad" class="form-label">Edad</label>
      <input
        type="number"
        class="form-control"
        id="edad"
        placeholder="Edad animal"
        formControlName="edad"
      />
    </div>
    <div class="mb-3">
      <label for="tipo" class="form-label">Tipo</label>
      <input
        type="text"
        class="form-control"
        id="tipo"
        placeholder="Tipo de animal"
        formControlName="tipo"
      />
    </div>
    <div class="input-group justify-content-center md-12">
      <button type="submit" class="btn btn-primary">Actualizar</button>
      <button type="button" class="btn btn-secondary ms-2" (click)="editableAnimal = false">Cancelar</button>
    </div>
  </form>
</div>
